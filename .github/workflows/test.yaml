name: Python CI

on:
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            # Step 1: Check out the repository code
            - name: Check out code
              uses: actions/checkout@v3

            # Step 2: Set up Python
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: '3.10'

            # Step 3: Set up SSH
            - name: Set up SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.ACTIONS_SSH_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan github.com >> ~/.ssh/known_hosts

            # Step 4: Debug SSH key (with verbose output for troubleshooting)
            - name: Debug SSH key
              run: ssh -v -T git@github.com || true

            # Step 5: Install dependencies (+ JAX cpu version)
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install --no-cache-dir -e .[dev]

            # Step 6: Run tests
            - name: Run tests
              run: pytest -v --junitxml=junit/test-results.xml
