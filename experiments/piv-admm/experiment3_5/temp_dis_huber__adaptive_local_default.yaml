config:
  consensus_algorithm: admm
  consensus_config:
    eps_abs_stopping: 1e-6
    eps_rel_stopping: 1e-6
    flows_objective_type: huber
    learning_rate_consensus: 0.01
    max_admm_iterations: 30
    normalization: none
    num_iterations_consensus: 30
    patch_size: 7
    regularizer_list:
    - smoothness
    - divergence
    - laplacian
    regularizer_weights:
      divergence: 1300.0
      laplacian: 30.0
      smoothness: 3.0
    rho: 2.0
    solver_consensus: adam
    solver_flows: closed_form_huber
    transformation: null
    weights:
    - 1.0
    - 1.0
    - 1.0
    weights_type: photograd
  estimators_list_path: src/flowgym/config/estimators/flow/piv_dataset/consensus/dis_list.yaml
  experiment_params:
    baseline_performance:
      max_epe: 0.24117
      max_relative_epe: 44.74119
      mean_epe: 0.15316
      mean_relative_epe: 12.70115
      min_epe: 0.08859
      min_relative_epe: 0.11474
    epe_limit: null
    log_path: results/experiment3_5/dis_huber__adaptive_local_default.csv
    oracle_select_weights: false
  jit: true
  oracle: true
  postprocess:
  - n_sigma: 2.0
    name: adaptive_local_filter
    radius: 2
  - name: laplace_interpolation
    num_iter: 256
  - name: median_smoothing
    radius: 2
  preprocess: src/flowgym/config/estimators/pre-processing/common.yaml
  use_temporal_propagation: true
estimate_type: flow
estimator: consensus
