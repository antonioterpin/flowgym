# Dataset parameters
seed: 0 # Random seed for reproducibility
batch_size: 64 # Number of (img1, img2, flow, density) tuples per batch
flow_fields_per_batch: 64 # Number of flow fields per batch
include_images: true # Whether to include images in the dataset
loop: true # Whether to loop the dataset
randomize: true # Whether to randomize the order of the batches
episode_length: 0
buffer_size: 100

# Image parameters
image_shape: [256, 256] # Shape of the images

# Min and max speed bounds in the flow field, used for constraint violations
min_speed_x: 0 # Minimum speed in the x direction
max_speed_x: 0 # Maximum speed in the x direction
min_speed_y: 0 # Minimum speed in the y direction
max_speed_y: 0 # Maximum speed in the y direction

output_units: "pixels" # Units of the output flow field

# Flows files
file_list:
    - /shared/fluids/fluids-estimation/piv_dataset_class1_256/train
scheduler_class: ".mat"
eval_gt: false # Whether to evaluate on groundtruth

# Supervised training controls
num_batches: 12000
save_every: 500
log_every: 20
save_only_best: true

# Validation uses the validation split of the same dataset.
validation:
  interval: 250
  num_batches: 20
  dataset: experiments/piv-admm/training_oracle/val_dataset.yaml
